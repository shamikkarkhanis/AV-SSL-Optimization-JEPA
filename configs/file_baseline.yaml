seed: 42

dataset:
  data_root: "data/raw/file/samples"
  frames_per_clip: 16
  tubelet_size: 2
  image_size: 224
  patch_size: 16
  mask_ratio: 0.75
  training_manifest: "data/manifests/baseline_manifest.jsonl"
  training_split: "train"
  validation_manifest: "data/manifests/baseline_manifest.jsonl"
  validation_split: "val"
  scoring_manifest: "data/manifests/baseline_manifest.jsonl"
  scoring_split: "test"
  evaluation_manifest: "data/manifests/baseline_manifest.jsonl"
  evaluation_split: "test"
  evaluation_labels: "data/manifests/baseline_manifest_evaluation_labels.jsonl"

model:
  encoder_name: "facebook/vjepa2-vitl-fpc64-256"
  embedding_dim: 1024
  init_mode: "pretrained"
  encoder_mode: "frozen"
  pretrained_name_or_path: "facebook/vjepa2-vitl-fpc64-256"
  resume_checkpoint: null
  predictor:
    hidden_dim: 1024
    dropout: 0.1
    activation: "gelu"

train:
  epochs: 1
  optimizer: "adamw"
  lr: 1.0e-4
  weight_decay: 0.01
  loss: "l1"
  normalize_embeddings: true
  checkpoint_every: 1
  target_metric: null

score:
  aggregation: "mean"
  power_watts: 75.0
  warmup_batches: 1
  amp: "auto"

evaluation:
  k_values: [10, 50, 100]
  primary_label_field: "binary_label"
  positive_labels: [1]
  include_medium_as_positive: false
  graded_labels:
    "0": 0.0
    "1": 1.0
  health_metrics:
    - "mean_cosine_similarity"
    - "validation_loss"

runtime:
  profile: "gpu"
  device: "auto"
  amp: "auto"
  num_workers: 4
  cpu_threads: null
  batch_size_overrides:
    train: 4
    score: 4
    evaluation: 4
  grad_accum_steps: 1
  profiles:
    cpu:
      device: "cpu"
      amp: "none"
      num_workers: 0
      batch_size_overrides:
        train: 1
        score: 1
        evaluation: 1
    gpu:
      device: "auto"
      amp: "auto"
    ddp:
      device: "cuda"
      amp: "auto"

experiment:
  name: "file_baseline"
  description: "Baseline JEPA run on migrated baseline_manifest CAM_FRONT subset."
  output_root: "experiments/runs"
