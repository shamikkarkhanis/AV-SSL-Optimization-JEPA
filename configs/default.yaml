seed: 42

train:
  epochs: 3
  optimizer: "adamw"
  lr: 1.0e-4
  weight_decay: 0.01
  loss: "l1"
  normalize_embeddings: true
  checkpoint_every: 1
  target_metric: null

score:
  aggregation: "mean"
  power_watts: 75.0
  warmup_batches: 1
  amp: "auto"

evaluation:
  k_values: [10, 50, 100]
  primary_label_field: "binary_label"
  positive_labels: ["high_value"]
  include_medium_as_positive: true
  graded_labels:
    low_value: 0.0
    medium_value: 1.0
    high_value: 2.0
  health_metrics:
    - "mean_cosine_similarity"
    - "validation_loss"

runtime:
  profile: "gpu"
  device: "auto"
  amp: "auto"
  num_workers: 8
  cpu_threads: null
  batch_size_overrides:
    train: 8
    score: 1
    evaluation: 8
  grad_accum_steps: 1
  profiles:
    cpu:
      device: "cpu"
      amp: "none"
      num_workers: 0
      batch_size_overrides:
        train: 1
        score: 1
        evaluation: 1
    gpu:
      device: "auto"
      amp: "auto"
    ddp:
      device: "cuda"
      amp: "auto"

experiment:
  name: "baseline"
  description: "Default JEPA clip-ranking experiment."
  output_root: "experiments/runs"
