seed: 42

dataset:
  data_root: "data/raw/v1.0-mini"
  frames_per_clip: 16
  tubelet_size: 2
  image_size: 224
  patch_size: 16
  mask_ratio: 0.75
  training_manifest: "data/manifests/clip_manifest_new.jsonl"
  training_split: "train"
  scoring_manifest: "data/manifests/test_manifest.jsonl"
  scoring_split: "val"
  evaluation_manifest: "data/manifests/clip_manifest_new.jsonl"
  evaluation_split: "val"
  evaluation_labels: null

model:
  encoder_name: "facebook/vjepa2-vitl-fpc64-256"
  embedding_dim: 1024
  init_mode: "pretrained"
  encoder_mode: "frozen"
  pretrained_name_or_path: "facebook/vjepa2-vitl-fpc64-256"
  resume_checkpoint: null
  predictor:
    hidden_dim: 1024
    dropout: 0.1
    activation: "gelu"

train:
  epochs: 3
  optimizer: "adamw"
  lr: 1.0e-4
  weight_decay: 0.01
  loss: "l1"
  normalize_embeddings: true
  checkpoint_every: 1
  target_metric: null

score:
  aggregation: "mean"
  power_watts: 75.0
  warmup_batches: 1
  amp: "auto"

evaluation:
  k_values: [10, 50, 100]
  primary_label_field: "adjudicated_label"
  positive_labels: ["high_value"]
  include_medium_as_positive: true
  graded_labels:
    low_value: 0.0
    medium_value: 1.0
    high_value: 2.0
  health_metrics:
    - "mean_cosine_similarity"
    - "validation_loss"

runtime:
  profile: "cpu"
  device: "auto"
  amp: "auto"
  num_workers: 0
  cpu_threads: null
  batch_size_overrides:
    train: 8
    score: 1
    evaluation: 8
  grad_accum_steps: 1
  profiles:
    cpu:
      device: "cpu"
      amp: "none"
      num_workers: 0
      batch_size_overrides:
        train: 1
        score: 1
        evaluation: 1
    gpu:
      device: "auto"
      amp: "auto"
    ddp:
      device: "cuda"
      amp: "auto"

experiment:
  name: "baseline"
  description: "Default JEPA clip-ranking experiment."
  output_root: "experiments/runs"
