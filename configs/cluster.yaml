seed: 42

dataset:
  data_root: "/gpfs/u/home/EFCM/EFCMnrkh/barn-shared/data/raw/v1.0-mini/sweeps"
  frames_per_clip: 16
  tubelet_size: 2
  image_size: 224
  patch_size: 16
  mask_ratio: 0.75
  training_manifest: "/gpfs/u/home/EFCM/EFCMnrkh/barn-shared/data/manifests/nuscenes_mini.jsonl"
  training_split: "train"
  validation_manifest: "/gpfs/u/home/EFCM/EFCMnrkh/barn-shared/data/manifests/nuscenes_mini.jsonl"
  validation_split: "val"
  scoring_manifest: "/gpfs/u/home/EFCM/EFCMnrkh/barn-shared/data/manifests/nuscenes_mini.jsonl"
  scoring_split: "test"
  evaluation_manifest: "/gpfs/u/home/EFCM/EFCMnrkh/barn-shared/data/manifests/nuscenes_mini.jsonl"
  evaluation_split: "test"
  evaluation_labels: "/gpfs/u/home/EFCM/EFCMnrkh/barn-shared/data/manifests/nuscenes_mini_evaluation_labels.jsonl"

model:
  encoder_name: "facebook/vjepa2-vitl-fpc64-256"
  embedding_dim: 1024
  init_mode: "pretrained"
  encoder_mode: "frozen"
  pretrained_name_or_path: "facebook/vjepa2-vitl-fpc64-256"
  resume_checkpoint: null
  predictor:
    hidden_dim: 1024
    dropout: 0.1
    activation: "gelu"

train:
  epochs: 3
  optimizer: "adamw"
  lr: 1.0e-4
  weight_decay: 0.01
  loss: "l1"
  normalize_embeddings: true
  checkpoint_every: 1
  target_metric: null

score:
  aggregation: "mean"
  power_watts: 75.0
  warmup_batches: 1
  amp: "auto"

evaluation:
  k_values: [10, 50, 100]
  primary_label_field: "binary_label"
  positive_labels: ["high_value"]
  include_medium_as_positive: true
  graded_labels:
    low_value: 0.0
    medium_value: 1.0
    high_value: 2.0
  health_metrics:
    - "mean_cosine_similarity"
    - "validation_loss"

runtime:
  profile: "gpu"
  device: "auto"
  amp: "auto"
  num_workers: 8
  persistent_workers: true
  prefetch_factor: 4
  cpu_threads: 8
  batch_size_overrides:
    train: 8
    score: 1
    evaluation: 8
  grad_accum_steps: 1
  profiles:
    cpu:
      device: "cpu"
      amp: "none"
      num_workers: 0
      batch_size_overrides:
        train: 1
        score: 1
        evaluation: 1
    gpu:
      device: "auto"
      amp: "auto"
    ddp:
      device: "cuda"
      amp: "auto"

experiment:
  name: "baseline-cluster"
  description: "Cluster-tuned JEPA clip-ranking experiment."
  output_root: "experiments/runs"
